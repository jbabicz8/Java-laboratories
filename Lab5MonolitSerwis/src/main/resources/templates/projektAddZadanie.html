<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:if="${projekt != null}" th:text="'Dodaj Zadanie do Projektu: ' + ${projekt.nazwa}">Dodaj Zadanie do Projektu</title>
  <title th:if="${projekt == null}">Dodaj Zadanie do Projektu</title>
  <link th:href="@{/css/list-style.css}" rel="stylesheet" />
  <link th:href="@{/css/form-style.css}" rel="stylesheet" />
  
</head>
<body>
<div class="main">
  <div class="header">
    <h1 th:if="${projekt != null}" th:text="'Dodaj Zadanie do Projektu: ' + ${projekt.nazwa}">Dodaj Zadanie</h1>
    <h1 th:if="${projekt == null}">Dodaj Zadanie do Projektu</h1>
    <div class="nav">
      <a th:if="${projekt != null}" th:href="@{/projektEdit(projektId=${projekt.projektId})}">Powrót do Edycji Projektu</a>
      <a th:href="@{/projektList}">Lista Projektów</a>
      <a th:href="@{/studentList}">Studenci</a>
      <a th:href="@{/zadanieList}">Zadania</a>
    </div>
  </div>

  <div th:if="${message}" class="info-message" th:text="${message}"></div>
  <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

  <form th:if="${projekt != null}" th:action="@{/projektAddZadanie}" method="POST" class="form-container">
    <input type="hidden" name="projektId" th:value="${projekt.projektId}" />

    <div> 
      <label for="zadanieId">Wybierz zadanie:</label>
      <select name="zadanieId" id="zadanieId" required>
        <option value="">-- Wybierz zadanie --</option>
        <option th:each="zadanie : ${zadania}"
                th:value="${zadanie.zadanieId}"
                th:text="${zadanie.nazwa + ' (' + zadanie.zadanieId + ')'}">
          Nazwa zadania
        </option>
      </select>
    </div>

    <div class="form-actions">
      <input type="submit" value="Dodaj" />
      <a th:href="@{/projektList}" class="button-cancel">Anuluj</a>
    </div>
  </form>

  <div th:if="${projekt == null}" class="form-container">
    <p>Nie określono projektu, do którego ma być dodane zadanie.</p>
    <div class="form-actions">
      <a th:href="@{/projektList}" class="button-cancel">Powrót do listy projektów</a>
    </div>
  </div>
</div>
</body>
</html>
